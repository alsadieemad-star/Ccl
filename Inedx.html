<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الأكاديمي المتكامل</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #c0392b; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #ecf0f1; margin: 0; padding: 20px; text-align: right; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 25px; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 16px; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .content-section { display: none; }
        .active-section { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 15px; transition: 0.3s; }
        .btn-search { background: var(--primary); }
        .btn-start { background: #2980b9; }
        .btn-clear { background: var(--danger); }
        .btn-export { background: var(--accent); }
        #resultsTable { width: 100%; margin-top: 20px; border-collapse: collapse; overflow-x: auto; display: block; }
        #resultsTable th, #resultsTable td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        #resultsTable th { background: #f8f9fa; }
        .marc-preview { background: #2d3436; color: #dfe6e9; padding: 15px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; margin-top: 15px; direction: ltr; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="switchTab(event, 'searchPage')">البحث الأكاديمي</button>
        <button class="tab" onclick="switchTab(event, 'inputPage')">إدخال بطاقة MARC</button>
    </div>

    <div id="searchPage" class="content-section active-section">
        <h3>1. تحميل الملف والبحث</h3>
        <input type="file" id="excelInput" accept=".xlsx, .xls" style="margin-bottom: 15px;">
        <input type="text" id="searchTerm" placeholder="أدخل كلمة البحث...">
        
        <div class="btn-group">
            <button class="btn-search" onclick="runSearch('contains')">بحث (يحتوي على)</button>
            <button class="btn-start" onclick="runSearch('starts')">بحث (يبدأ بـ)</button>
            <button class="btn-clear" onclick="clearAll()">مسح النتائج والعودة</button>
        </div>

        <div id="tableContainer">
            <table id="resultsTable"></table>
        </div>
    </div>

    <div id="inputPage" class="content-section">
        <h3>2. فهرسة بطاقة جديدة (MARC 21)</h3>
        <div class="form-group"><label>العنوان الرئيسي (245):</label><input type="text" id="titleField"></div>
        <div class="form-group"><label>اسم المؤلف (100):</label><input type="text" id="authorField"></div>
        <div class="form-group"><label>مكان وعام النشر (260):</label><input type="text" id="pubField"></div>
        <div class="form-group"><label>الرقم المعياري ISBN (020):</label><input type="text" id="isbnField"></div>
        <div class="form-group"><label>رقم التصنيف (082):</label><input type="text" id="classField"></div>

        <div class="btn-group">
            <button class="btn-export" onclick="generateMARC()">تحويل وتصدير البطاقة</button>
        </div>

        <div id="marcOutputArea" style="display:none;">
            <h4>معاينة صيغة MARC:</h4>
            <div class="marc-preview" id="marcContent"></div>
        </div>
    </div>
</div>

<script>
    let dataStore = [];

    // التبديل بين الصفحات
    function switchTab(evt, sectionId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active-section');
        evt.currentTarget.classList.add('active');
    }

    // قراءة ملف الإكسل عند اختياره
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheetName = workbook.SheetNames[0];
            dataStore = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
            alert("تم قراءة الملف! عدد السجلات: " + dataStore.length);
        };
        reader.readAsArrayBuffer(file);
    });

    // وظيفة البحث
    function runSearch(mode) {
        const query = document.getElementById('searchTerm').value.trim().toLowerCase();
        if (!query || dataStore.length === 0) {
            alert("تأكد من تحميل ملف الإكسل وكتابة كلمة البحث");
            return;
        }

        const filtered = dataStore.filter(row => {
            return Object.values(row).some(val => {
                const sVal = String(val).toLowerCase();
                return mode === 'contains' ? sVal.includes(query) : sVal.startsWith(query);
            });
        });

        renderTable(filtered);
    }

    function renderTable(data) {
        const table = document.getElementById('resultsTable');
        table.innerHTML = "";
        if (data.length === 0) { table.innerHTML = "<tr><td>لا توجد نتائج</td></tr>"; return; }

        const headers = Object.keys(data[0]);
        let headerRow = "<tr>" + headers.map(h => `<th>${h}</th>`).join('') + "</tr>";
        let rows = data.map(r => "<tr>" + headers.map(h => `<td>${r[h] || ''}</td>`).join('') + "</tr>").join('');
        
        table.innerHTML = headerRow + rows;
    }

    // مسح النتائج
    function clearAll() {
        document.getElementById('searchTerm').value = "";
        document.getElementById('resultsTable').innerHTML = "";
        alert("تم مسح النتائج والعودة للوضع الرئيسي");
    }

    // توليد وتصدير MARC
    function generateMARC() {
        const t = document.getElementById('titleField').value;
        const a = document.getElementById('authorField').value;
        const p = document.getElementById('pubField').value;
        const i = document.getElementById('isbnField').value;
        const c = document.getElementById('classField').value;

        const marcText = `000  00000nam a2200000 i 4500\n020  ## $a ${i}\n082  ## $a ${c}\n100  1# $a ${a}\n245  10 $a ${t}\n260  ## $b ${p}`;
        
        document.getElementById('marcContent').innerText = marcText;
        document.getElementById('marcOutputArea').style.display = 'block';

        // تصدير الملف
        const blob = new Blob([marcText], {type: 'text/plain'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `بطاقة_فهرسة_${t}.txt`;
        link.click();
    }
</script>

</body>
</html>
